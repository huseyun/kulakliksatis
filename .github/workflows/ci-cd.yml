name: CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/huseyun/kulakliksitesi-backend
  FRONTEND_IMAGE: ghcr.io/huseyun/kulakliksitesi-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./back-end
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./front-end
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, windows]
    permissions:
      contents: read
      packages: read
    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker compose pull
      - run: docker compose up -d
      - run: docker image prune -f
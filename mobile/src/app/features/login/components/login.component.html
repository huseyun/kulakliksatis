<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" type="text" placeholder="Enter username">
          <mat-error *ngIf="usernameControl?.hasError('required') && usernameControl?.touched">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Enter password">
          <mat-error *ngIf="passwordControl?.hasError('required') && passwordControl?.touched">
            Password is required
          </mat-error>
        </mat-form-field>

        <p *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </p>

        <button mat-raised-button color="primary" type="submit" 
                [disabled]="loginForm.invalid" class="full-width">
          Login
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="home-layout">
  <!-- Sidebar: Categories -->
  <aside class="sidebar">
    <h2 class="sidebar-title">Kategoriler</h2>
    <mat-nav-list>
      <a mat-list-item href="#">Kulaküstü</a>
      <a mat-list-item href="#">Kulakiçi</a>
    </mat-nav-list>
  </aside>

  <!-- Main Content: Editor's Choice -->
  <main class="main-content">
    <h2 class="section-title">Editörün Seçimi</h2>
    
    <div *ngIf="isLoading" class="loading-container">
      Yükleniyor...
    </div>

    <div *ngIf="!isLoading && recommendedItems.length === 0" class="empty-state">
      Şu an için önerilen ürün bulunmamaktadır.
    </div>

    <div *ngIf="!isLoading && recommendedItems.length > 0" class="item-grid">
      <!-- Dynamic Items -->
      <mat-card class="item-card" *ngFor="let item of recommendedItems" [routerLink]="['/products', item.id]" style="cursor: pointer;">
        <img mat-card-image *ngIf="item.thumbnailImageUrl && !imageErrors[item.id]" [src]="item.thumbnailImageUrl" [alt]="item.title" (error)="onImageError(item.id)">
        <div class="image-placeholder" *ngIf="!item.thumbnailImageUrl || imageErrors[item.id]">
          <mat-icon>image_not_supported</mat-icon>
        </div>
        <mat-card-content>
          <h3 class="item-title">{{ item.title }}</h3>
          <p class="item-price">{{ item.price | currency:'TRY':'symbol':'1.2-2':'tr-TR' }}</p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button color="primary" (click)="$event.stopPropagation()">Sepete Ekle</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </main>
</div>

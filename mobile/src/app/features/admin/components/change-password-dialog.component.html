<h2 mat-dialog-title>Şifre Değiştir - {{ data.username }}</h2>

<mat-dialog-content>
  <form [formGroup]="passwordForm" class="password-form">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Yeni Şifre</mat-label>
      <input matInput type="password" formControlName="password" placeholder="Yeni şifre giriniz">
      <mat-error *ngIf="passwordForm.get('password')?.hasError('required')">
        Şifre zorunludur
      </mat-error>
      <mat-error *ngIf="passwordForm.get('password')?.hasError('minlength')">
        Şifre en az 8 karakter olmalıdır
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading">İptal</button>
  <button mat-raised-button color="warn" (click)="onSubmit()" [disabled]="passwordForm.invalid || isLoading">
    {{ isLoading ? 'Kaydediliyor...' : 'Şifreyi Değiştir' }}
  </button>
</mat-dialog-actions>

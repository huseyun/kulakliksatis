<h2 mat-dialog-title>Kullanıcı Bilgilerini Düzenle</h2>

<mat-dialog-content>
  <form [formGroup]="userForm" class="user-form">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Kullanıcı Adı</mat-label>
      <input matInput formControlName="username" placeholder="Kullanıcı adı giriniz">
      <mat-error *ngIf="userForm.get('username')?.hasError('required')">
        Kullanıcı adı zorunludur
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>E-posta</mat-label>
      <input matInput type="email" formControlName="email" placeholder="E-posta adresi giriniz">
      <mat-error *ngIf="userForm.get('email')?.hasError('required')">
        E-posta zorunludur
      </mat-error>
      <mat-error *ngIf="userForm.get('email')?.hasError('email')">
        Geçerli bir e-posta adresi giriniz
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading">İptal</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="userForm.invalid || isLoading">
    {{ isLoading ? 'Kaydediliyor...' : 'Kaydet' }}
  </button>
</mat-dialog-actions>
